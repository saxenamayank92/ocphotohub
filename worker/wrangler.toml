name = "pictide-api"
main = "src/index.js"
compatibility_date = "2026-07-18"

[[d1_databases]]
binding = "DB"
database_name = "pictide"
database_id = "25141cfd-2e4b-4945-aee0-253674369ab3"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "pictide-photos"

[vars]
ALLOWED_ORIGIN = "https://clubphotohub.xtide.io,https://ocphotohub.xtide.io,https://ocphotohub.netlify.app,https://ocphotohub.vercel.app"
ADMIN_EMAIL = "admin@oakville.com"
APP_ORIGIN = "https://ocphotohub.xtide.io"
LEGACY_PHOTO_HOSTS = "images.unsplash.com"
PILOT_MODE = "true"

[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 12
  period = 60

[[ratelimits]]
name = "RESET_RATE_LIMITER"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 4
  period = 60
